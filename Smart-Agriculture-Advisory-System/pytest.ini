[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Display options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (if pytest-cov is installed)
# Uncomment these to enable coverage reporting
# addopts = --cov=app --cov-report=html --cov-report=term-missing --cov-fail-under=70

# Markers for test categorization
markers =
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow running
    auth: marks tests related to authentication
    weather: marks tests related to weather service
    advisory: marks tests related to advisories
    feedback: marks tests related to feedback
    ml: marks tests related to ML model
    sms: marks tests related to SMS tasks
    dashboard: marks tests related to dashboard

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests.log
log_file_level = DEBUG

# Timeout (requires pytest-timeout)
# timeout = 300
